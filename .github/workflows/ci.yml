# .github/workflows/ci.yml
name: CI — Build & Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── donation-service: Go ─────────────────────────────────────
  build-donation-service:
    name: Build & Scan — donation-service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/donation-service/go.sum

      - name: Compilar binário Go
        working-directory: apps/donation-service
        run: go build -o /dev/null ./main.go

      - name: Testes unitários Go
        working-directory: apps/donation-service
        run: go test ./... -v -timeout 30s

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/donation-service:${{ github.sha }} \
            ./apps/donation-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/donation-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          docker run -d --name test-donation \
            -p 8082:8082 \
            -e PORT=8082 \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            solidarytech/donation-service:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8082/health
          docker stop test-donation

  # ─── ngo-service: Python ──────────────────────────────────────
  build-ngo-service:
    name: Build & Scan — ngo-service (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ngo-service/requirements.txt

      - name: Verificar dependências Python
        working-directory: apps/ngo-service
        run: pip install -r requirements.txt

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/ngo-service:${{ github.sha }} \
            ./apps/ngo-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/ngo-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          set -euo pipefail
          cleanup() {
            docker logs test-ngo --tail 80 || true
            docker stop test-ngo test-ngo-db >/dev/null 2>&1 || true
            docker rm test-ngo test-ngo-db >/dev/null 2>&1 || true
            docker network rm smoke-net >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create smoke-net

          docker run -d --name test-ngo-db \
            --network smoke-net \
            -e POSTGRES_DB=ngo \
            -e POSTGRES_USER=ngo \
            -e POSTGRES_PASSWORD=ngo \
            postgres:16-alpine

          # Aguarda Postgres aceitar conexões (max 60s)
          for i in {1..30}; do
            if docker exec test-ngo-db pg_isready -U ngo -d ngo >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Postgres não ficou pronto a tempo"
              exit 1
            fi
            sleep 2
          done

          docker run -d --name test-ngo \
            --network smoke-net \
            -e PORT=8081 \
            -e DATABASE_URL=postgresql://ngo:ngo@test-ngo-db:5432/ngo \
            solidarytech/ngo-service:${{ github.sha }}

          # Aguarda health responder (max 60s), evitando step pendurado
          for i in {1..30}; do
            if docker run --rm --network smoke-net curlimages/curl:8.8.0 -fsS --max-time 3 http://test-ngo:8081/health >/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Healthcheck do ngo-service não respondeu a tempo"
              exit 1
            fi
            sleep 2
          done

          docker run --rm --network smoke-net curlimages/curl:8.8.0 -fsS --max-time 5 http://test-ngo:8081/health

  # ─── volunteer-service: Python ────────────────────────────────
  build-volunteer-service:
    name: Build & Scan — volunteer-service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/volunteer-service/requirements.txt

      - name: Verificar dependências Python
        working-directory: apps/volunteer-service
        run: pip install -r requirements.txt

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/volunteer-service:${{ github.sha }} \
            ./apps/volunteer-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/volunteer-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          docker run -d --name test-volunteer \
            -p 8083:8083 \
            -e PORT=8083 \
            -e AWS_REGION=us-east-1 \
            -e AWS_DYNAMODB_TABLE=solidarytech-volunteers \
            -e AWS_ACCESS_KEY_ID=local \
            -e AWS_SECRET_ACCESS_KEY=local \
            solidarytech/volunteer-service:${{ github.sha }}
          sleep 12
          curl -f http://localhost:8083/health
          docker stop test-volunteer