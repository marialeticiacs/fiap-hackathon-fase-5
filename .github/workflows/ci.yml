# .github/workflows/ci.yml
name: CI — Build & Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── donation-service: Go ─────────────────────────────────────
  build-donation-service:
    name: Build & Scan — donation-service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/donation-service/go.sum

      - name: Compilar binário Go
        working-directory: apps/donation-service
        run: go build -o /dev/null ./main.go

      - name: Testes unitários Go
        working-directory: apps/donation-service
        run: go test ./... -v -timeout 30s

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/donation-service:${{ github.sha }} \
            ./apps/donation-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/donation-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          docker run -d --name test-donation \
            -p 8082:8082 \
            -e PORT=8082 \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            solidarytech/donation-service:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8082/health
          docker stop test-donation

  # ─── ngo-service: Python ──────────────────────────────────────
  build-ngo-service:
    name: Build & Scan — ngo-service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ngo-service/requirements.txt

      - name: Verificar dependências Python
        working-directory: apps/ngo-service
        run: pip install -r requirements.txt

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/ngo-service:${{ github.sha }} \
            ./apps/ngo-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/ngo-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          docker run -d --name test-ngo \
            -p 8081:8081 \
            -e PORT=8081 \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            solidarytech/ngo-service:${{ github.sha }}
          sleep 12
          curl -f http://localhost:8081/health
          docker stop test-ngo

  # ─── volunteer-service: Python ────────────────────────────────
  build-volunteer-service:
    name: Build & Scan — volunteer-service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/volunteer-service/requirements.txt

      - name: Verificar dependências Python
        working-directory: apps/volunteer-service
        run: pip install -r requirements.txt

      - name: Build da imagem
        run: |
          docker build \
            -t solidarytech/volunteer-service:${{ github.sha }} \
            ./apps/volunteer-service

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: solidarytech/volunteer-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Healthcheck smoke test
        run: |
          docker run -d --name test-volunteer \
            -p 8083:8083 \
            -e PORT=8083 \
            -e AWS_REGION=us-east-1 \
            -e AWS_DYNAMODB_TABLE=solidarytech-volunteers \
            -e AWS_ACCESS_KEY_ID=local \
            -e AWS_SECRET_ACCESS_KEY=local \
            solidarytech/volunteer-service:${{ github.sha }}
          sleep 12
          curl -f http://localhost:8083/health
          docker stop test-volunteer