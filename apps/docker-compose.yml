version: "3.9"

services:

  # ─── ngo-service (Python/Flask + PostgreSQL) ───────────────────
  ngo-service:
    build:
      context: ./apps/ngo-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/solidarytech
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ─── donation-service (Go + PostgreSQL + SQS) ──────────────────
  donation-service:
    build:
      context: ./apps/donation-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/solidarytech
      - AWS_REGION=us-east-1
      - AWS_SQS_URL=   # vazio localmente — SQS não é ativado sem URL
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ─── volunteer-service (Python/Flask + DynamoDB) ───────────────
  volunteer-service:
    build:
      context: ./apps/volunteer-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - AWS_REGION=us-east-1
      - AWS_DYNAMODB_TABLE=solidarytech-volunteers
      # Apontar para DynamoDB local em dev
      - AWS_ENDPOINT_URL=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      dynamodb-local:
        condition: service_started
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solidarytech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql executado automaticamente na primeira vez
      - ./apps/ngo-service/init.sql:/docker-entrypoint-initdb.d/01-ngo.sql
      - ./apps/donation-service/init.sql:/docker-entrypoint-initdb.d/02-donation.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── DynamoDB Local (substitui DynamoDB AWS em dev) ───────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped

  # ─── Init DynamoDB: cria a tabela automaticamente ─────────────
  dynamodb-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      - dynamodb-local
    entrypoint: >
      sh -c "
        sleep 3 &&
        aws dynamodb create-table \
          --table-name solidarytech-volunteers \
          --attribute-definitions AttributeName=volunteer_id,AttributeType=S \
          --key-schema AttributeName=volunteer_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 &&
        echo 'Tabela DynamoDB criada com sucesso'
      "
    restart: "no"

volumes:
  postgres_data: